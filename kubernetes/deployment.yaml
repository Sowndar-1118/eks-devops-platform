apiVersion: apps/v1
kind: Deployment

metadata:
  name: eks-platform-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: eks-platform

  template:
    metadata:
      labels:
        app: eks-platform

    spec:
      containers:
      - name: eks-platform-container
        image: 075008446978.dkr.ecr.ap-south-1.amazonaws.com/eks-devops-app:latest
        imagePullPolicy: Always

        ports:
        - containerPort: 5000
